# LeRobot 数据上传系统配置文件

# 上传服务器配置
upload:
  # 远程服务器IP
  # TODO: 修改为实际服务器IP
  remote_ip: "39.96.194.254"
  
  # 远程服务器端口
  remote_port: 516
  
  # 远程服务器用户名
  remote_user: "root"
  
  # 远程目标目录
  remote_target_dir: "/mnt/oss_data/anyverse_human_data_record_raw/arxx5_bimanual/"
  
  # 上传脚本路径（相对于项目根目录）
  script: "upload_system/upload_data.sh"

# 守护进程配置
daemon:
  # 检查待上传任务的间隔时间（秒）
  check_interval_seconds: 60
  
  # 最大并发上传数量
  max_concurrent_uploads: 1

# 数据配置
data:
  # 数据根目录（存放所有录制数据）
  # 与 scripts/run_session.sh 的默认 DATA_ROOT 保持一致：
  # session.recording.data_root 与该路径默认值一致时，Batch 信息可被自动发现。
  root: "~/lerobot_data_collection"
  
  # 批次注册表文件名
  registry_filename: "batch_registry.json"

# 监控配置
monitoring:
  # 磁盘空间警告阈值（GB）
  # 当剩余空间低于此值时，Web界面显示黄色警告
  disk_warning_threshold_gb: 100
  
  # 磁盘空间严重警告阈值（GB）
  # 当剩余空间低于此值时，Web界面显示红色警告
  disk_critical_threshold_gb: 10

# Web服务配置
web:
  # 监听地址（0.0.0.0表示允许外部访问）
  host: "0.0.0.0"
  
  # 监听端口
  port: 5000

# 日志配置
logging:
  # 日志目录
  dir: "./upload_system_logs"
  
  # 日志级别（DEBUG, INFO, WARNING, ERROR, CRITICAL）
  level: "INFO"
  
  # 单个日志文件最大大小（MB）
  max_size_mb: 100
  
  # 保留的日志备份数量
  backup_count: 10
