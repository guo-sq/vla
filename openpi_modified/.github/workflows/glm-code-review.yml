name: GLM-5 Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

jobs:
  glm-5-review:
    if: github.event_name != 'pull_request_target' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run GLM-5 Code Review
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        shell: bash
        run: |
          python .github/workflows/glm_code_review.py

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.review.outputs.pr_number }}');
            const marker = '<!-- glm-code-review -->';
            const review = ${{ toJSON(steps.review.outputs.review) }};
            const body = `${marker}
            ## GLM-5 代码审查

            ${review}

            ---
            由智谱 GLM-5 自动生成`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
