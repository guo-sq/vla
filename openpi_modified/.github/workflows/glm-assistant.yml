name: GLM-5 Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: Assistant prompt
        required: true
        type: string
      pr_number:
        description: Optional pull request number for context and comment posting
        required: false
        type: string

jobs:
  glm-5-assistant:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@glm')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@glm')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@glm')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@glm') || contains(github.event.issue.title, '@glm')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run GLM-5 Assistant
        id: glm
        env:
          GH_TOKEN: ${{ github.token }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        shell: bash
        run: |
          python .github/workflows/glm_assistant.py

      - name: Post reply
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.glm.outputs.pr_number }}';
            const reply = `## GLM-5 助手回复

            ${{ steps.glm.outputs.reply }}

            ---
            由智谱 GLM-5 生成`;
            
            // 根据事件类型选择正确的API
            if (context.eventName === 'pull_request_review_comment') {
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                comment_id: context.payload.comment.id,
                body: reply
              });
            } else if (context.eventName === 'workflow_dispatch' && prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(prNumber),
                body: reply
              });
            } else if (context.eventName === 'workflow_dispatch') {
              core.summary.addHeading('GLM-5 Assistant Reply');
              core.summary.addRaw(reply);
              await core.summary.write();
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reply
              });
            }
