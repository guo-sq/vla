exclude: |
  (?x)^(
    third_party/|
    tools/public_dataset/
  )

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.5.14
    hooks:
      - id: uv-lock
        files: ^(pyproject\.toml|uv\.lock)$
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^(src|tests|scripts|packages)/.*\.pyi?$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.8.6
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
        files: ^(src|tests|scripts|packages)/.*\.pyi?$